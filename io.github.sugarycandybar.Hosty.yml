app-id: io.github.sugarycandybar.Hosty
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: hosty
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - python3-requirements.json
  - name: hosty
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/sugarycandybar/Hosty.git
        commit: d426fa187195d376578e98e7233e2673ab15372e
