app-id: io.github.sugarycandybar.Hosty
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: hosty
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - python3-requirements.json
  - name: hosty
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/sugarycandybar/Hosty.git
        commit: 0dfd3b6fe33f4cc644a513b396eda601f019d60a
